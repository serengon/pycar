# ============================================
# MediaMTX - Configuración de red (compartida)
# El bloque paths es generado dinámicamente por
# server.py según el preset de calidad activo.
# ============================================

logLevel: warn

# ---- RTSP (interno) ----
rtsp: yes
rtspAddress: :8554

# ---- WebRTC (lo que consume el celu) ----
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcICEServers2: []

# ---- Desactivar lo que no usamos ----
hls: no
rtmp: no
srt: no

# ---- Paths (fallback si server.py no genera el runtime yml) ----
paths:
  cam:
    runOnInit: >
      ffmpeg -f v4l2 -input_format mjpeg -video_size 640x360 -framerate 30
      -i /dev/video0
      -fflags +nobuffer -flags +low_delay
      -vf format=yuv420p
      -c:v libx264
      -profile:v baseline
      -preset ultrafast
      -tune zerolatency
      -b:v 1500k
      -g 10
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH

    runOnInitRestart: yes
