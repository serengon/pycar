# ============================================
# MediaMTX - Modo LAN (red del router)
# ============================================

logLevel: warn

# ---- RTSP (interno) ----
rtsp: yes
rtspAddress: :8554

# ---- WebRTC (lo que consume el celu) ----
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcICEServers2: []
# Sin webrtcIPAddresses: MediaMTX auto-detecta la IP de la red

# ---- Desactivar lo que no usamos ----
hls: no
rtmp: no
srt: no

# ---- Paths ----
paths:
  cam:
    # MED preset (default) - libx264 zerolatency @ 640x360 nativa C505
    runOnInit: >
      ffmpeg -f v4l2 -input_format mjpeg -video_size 640x360 -framerate 30
      -i /dev/video0
      -fflags +nobuffer -flags +low_delay
      -vf format=yuv420p
      -c:v libx264
      -profile:v baseline
      -preset ultrafast
      -tune zerolatency
      -b:v 1500k
      -g 10
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH

    runOnInitRestart: yes
