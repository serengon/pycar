# ============================================
# MediaMTX - Modo LAN (red del router)
# ============================================

logLevel: info

# ---- RTSP (interno) ----
rtsp: yes
rtspAddress: :8554

# ---- WebRTC (lo que consume el celu) ----
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcICEServers2: []
# Sin webrtcIPAddresses: MediaMTX auto-detecta la IP de la red

# ---- Desactivar lo que no usamos ----
hls: no
rtmp: no
srt: no

# ---- Paths ----
paths:
  cam:
    # Hardware encoder Pi 4
    runOnInit: >
      ffmpeg -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 30
      -i /dev/video0
      -c:v h264_v4l2m2m
      -b:v 2M
      -g 15
      -bf 0
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH

    # Software encoder (descomentar si h264_v4l2m2m falla)
    # runOnInit: >
    #   ffmpeg -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 30
    #   -i /dev/video0
    #   -c:v libx264
    #   -preset ultrafast
    #   -tune zerolatency
    #   -b:v 2M
    #   -g 15
    #   -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH

    runOnInitRestart: yes
