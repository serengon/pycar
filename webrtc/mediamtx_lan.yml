# ============================================
# MediaMTX - Modo LAN (red del router)
# ============================================

logLevel: warn

# ---- RTSP (interno) ----
rtsp: yes
rtspAddress: :8554

# ---- WebRTC (lo que consume el celu) ----
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcICEServers2: []
# Sin webrtcIPAddresses: MediaMTX auto-detecta la IP de la red

# ---- Desactivar lo que no usamos ----
hls: no
rtmp: no
srt: no

# ---- Paths ----
paths:
  cam:
    # Low-latency encoder (libx264 zerolatency @ 480x270)
    runOnInit: >
      ffmpeg -f v4l2 -input_format mjpeg -video_size 480x270 -framerate 30
      -i /dev/video0
      -fflags +nobuffer -flags +low_delay
      -vf format=yuv420p
      -c:v libx264
      -profile:v baseline
      -preset ultrafast
      -tune zerolatency
      -b:v 1M
      -g 10
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH

    # Hardware encoder (más fps, más latencia)
    # runOnInit: >
    #   ffmpeg -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 30
    #   -i /dev/video0
    #   -vf format=yuv420p
    #   -c:v h264_v4l2m2m
    #   -b:v 2M
    #   -g 15
    #   -bf 0
    #   -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH

    runOnInitRestart: yes
